<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Job Applications Automation</title>
    <link rel="icon" 
      type="image/png" 
      href="{{ url_for('static', filename='favicon.png') }}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">
    <div class="min-h-screen flex items-center justify-center">
        <div class="bg-white shadow-lg rounded-lg p-8 max-w-md w-full">
            <h1 class="text-4xl font-bold text-center text-blue-600 mb-6">Login</h1>
            
            {% if error %}
                <p class="text-red-500 text-center mb-4">{{ error }}</p>
            {% endif %}

            <form method="POST" action="/login" class="space-y-4">
                <div>
                    <label for="username" class="block text-md font-medium text-gray-700">Username</label>
                    <input type="text" id="username" name="username" required
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm 
                                  focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                </div>

                <div>
                    <label for="password" class="block text-md font-medium text-gray-700">Password</label>
                    <div class="relative mt-1">
                        <input type="password" id="password" name="password" required
                               class="block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm 
                                      focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm pr-10">
                        <button type="button" id="togglePassword" 
                                class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-500">
                            <!-- Eye icon -->
                            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" 
                                 class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 
                                         9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="flex justify-center">
                    <button type="submit"
                            class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600 
                                   focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                        Login
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const passwordInput = document.getElementById("password");
        const togglePassword = document.getElementById("togglePassword");
        const eyeIcon = document.getElementById("eyeIcon");

        togglePassword.addEventListener("click", () => {
            const isPassword = passwordInput.type === "password";
            passwordInput.type = isPassword ? "text" : "password";

            // Swap eye icon (open vs closed)
            eyeIcon.innerHTML = isPassword 
                ? `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                         d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7 
                            .523-1.667 1.464-3.154 2.667-4.275M9.88 9.88a3 3 0 104.24 4.24"/> 
                   <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                         d="M3 3l18 18" />`
                : `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                         d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /> 
                   <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                         d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 
                            9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />`;
        });
    </script>
</body>
</html>
